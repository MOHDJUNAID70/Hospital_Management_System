<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctors Information</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        }
        .doctor-layout {
            display: flex;
            min-height: 100vh;
            background: none;
        }
        .doctor-sidebar {
            min-width: 240px;
            max-width: 260px;
            background: linear-gradient(180deg, #e3e9f7 0%, #f8fafd 100%);
            border-radius: 24px 0 0 24px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            padding: 36px 18px 18px 18px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: sticky;
            top: 0;
            height: 100vh;z-index: 10;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: 800;
            color: #232946;
            margin-bottom: 38px;
            letter-spacing: 1px;
        }
        .sidebar-header i { color: #00c6ff; font-size: 1.7rem; }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            margin-bottom: 10px;
            font-size: 1.08rem;
            font-weight: 600;
            color: #232946;
            background: transparent;
            border-radius: 10px;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            width: 100%;
        }
        .sidebar-link.active, .sidebar-link:hover {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .sidebar-link i { font-size: 1.2rem; color: #00c6ff; transition: color 0.2s; }
        .sidebar-link.active i, .sidebar-link:hover i { color: #fff; }
        .doctor-main-content { flex: 1; padding: 0; background: none; min-width: 0; }
        .patient-container {
            max-width: 1200px;
            margin: 48px auto 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            padding: 40px 32px 32px 32px;
            position: relative;
        }
        .patient-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 32px;
            color: #232946;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,198,255,0.08);
        }
        /* Filter Section */
        .filter-section {
            background: linear-gradient(90deg, #f8fafd 0%, #e3e9f7 100%);
            border-radius: 32px;
            box-shadow: 0 2px 16px rgba(0,198,255,0.10);
            padding: 0;
            margin-bottom: 32px;
            width: 100%;
        }
        .filter-bar {
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 24px 32px 18px 32px;
            gap: 18px;
        }
        .filter-col {
            display: flex;
            flex-direction: column;
            min-width: 140px;
            flex: 1 1 0;
        }
        .filter-label {
            font-weight: 600;
            color: #232946;
            margin-bottom: 6px;
            font-size: 1.02rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-input {
            border: 2px solid #e0e6f7;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 1.05rem;
            background: #fff;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .filter-input:focus { border: 2px solid #00c6ff; outline: none; }
        .filter-actions {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex: 0 0 auto;
        }
        .filter-btn {
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
        }
        .filter-search {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .filter-search:hover { background: linear-gradient(90deg, #232946 0%, #00c6ff 100%); }
        .filter-clear {
            background: #fafdff;
            color: #232946;
            border: 2px solid #bbb;
        }
        .filter-clear:hover { background: #e0e6f7; color: #00c6ff; }
        /* Cards Grid */
        .patient-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
            justify-items: center;
        }
        .patient-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(44,62,80,0.10);
            padding: 0;
            width: 100%;
            max-width: 360px;
            transition: box-shadow 0.3s, transform 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .patient-card:hover {
            box-shadow: 0 12px 40px rgba(0,198,255,0.22);
            transform: translateY(-6px);
        }
        .card-header {
            background: linear-gradient(135deg, #00c6ff 0%, #232946 100%);
            padding: 28px 24px 18px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .card-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .card-avatar i {
            font-size: 2rem;
            color: #fff;
        }
        .card-name {
            font-size: 1.35rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .card-badge {
            display: inline-block;
            background: rgba(255,255,255,0.22);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 3px 16px;
            border-radius: 20px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .card-body {
            padding: 20px 24px 22px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }
        .card-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            color: #555;
        }
        .card-detail i {
            color: #00c6ff;
            font-size: 1.05rem;
            width: 22px;
            text-align: center;
        }
        .card-detail span {
            font-weight: 700;
            color: #232946;
        }
        .card-divider {
            border: none;
            border-top: 1.5px solid #e0e6f7;
            margin: 6px 0;
        }
        /* Card Actions */
        .card-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px 18px 24px;
            border-top: 1.5px solid #e0e6f7;
            flex-wrap: wrap;
        }
        .card-action-btn {
            font-size: 0.88rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }
        .card-action-view {
            background: none;
            border: 2px solid #00c6ff;
            color: #00c6ff;
        }
        .card-action-view:hover { background: #00c6ff; color: #fff; }
        .card-action-edit {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .card-action-edit:hover { background: linear-gradient(90deg, #232946 0%, #00c6ff 100%); }
        .card-action-delete {
            background: none;
            border: 2px solid #dc3545;
            color: #dc3545;
            margin-left: 100px;
        }
        .card-action-delete:hover { background: #dc3545; color: #fff; }
        .card-action-appointments {
            background: none;
            border: 2px solid #6c5ce7;
            color: #6c5ce7;
        }
        .card-action-appointments:hover { background: #6c5ce7; color: #fff; }
        .no-data {
            text-align: center;
            color: #a94442;
            font-size: 1.3rem;
            font-style: italic;
            margin: 48px 0;
        }
        .no-data i { font-size: 1.5rem; margin-right: 6px; }
        /* Add Button */
        .add-btn-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }
        .add-btn {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
            font-weight: 700;
            border-radius: 10px;
            font-size: 1.05rem;
            padding: 10px 26px;
            box-shadow: 0 2px 8px rgba(0,198,255,0.10);
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn:hover { background: linear-gradient(90deg, #232946 0%, #00c6ff 100%); }
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0;
            width: 100vw; height: 100vh;
            background: rgba(44,62,80,0.18);
            align-items: center;
            justify-content: center;
        }
        .modal-box {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.18);
            padding: 32px 28px;
            max-width: 420px;
            width: 95%;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 18px; right: 22px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #232946;
            opacity: 0.7;
            background: none; border: none;
        }
        .modal-close:hover { opacity: 1; }
        .modal-title {
            text-align: center;
            color: #232946;
            font-weight: 800;
            font-size: 1.4rem;
            margin-bottom: 18px;
        }
        .modal-title i { color: #00c6ff; }
        .modal-form label {
            font-weight: 700;
            color: #232946;
            font-size: 0.95rem;
        }
        .modal-form .form-group {
            margin-bottom: 14px;
        }
        .modal-form input, .modal-form select {
            width: 100%;
            border: 2px solid #e0e6f7;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 1.05rem;
            background: #fafdff;
            margin-top: 4px;
            box-sizing: border-box;
        }
        .modal-form input:focus, .modal-form select:focus { border: 2px solid #00c6ff; outline: none; }
        .modal-submit {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
            margin-top: 10px;
        }
        .modal-submit:hover { background: linear-gradient(90deg, #232946 0%, #00c6ff 100%); }
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 36px;
        }
        .page-btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 2px solid #e0e6f7;
            background: #fff;
            color: #232946;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .page-btn:hover { background: #00c6ff; color: #fff; border-color: #00c6ff; }
        .page-btn.active { background: linear-gradient(90deg, #00c6ff 0%, #232946 100%); color: #fff; border-color: #00c6ff; }
        .page-btn.disabled { opacity: 0.5; pointer-events: none; }
        @media (max-width: 900px) {
            .filter-bar { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; }
            .filter-col { width: 100%; min-width: 0; }
            .patient-cards { grid-template-columns: 1fr; }
            .doctor-sidebar { display: none; }
            .patient-container { margin: 16px 8px; padding: 20px 10px; }
        }
    </style>
</head>
<body>
<div class="doctor-layout">
    <aside class="doctor-sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-hospital"></i>
            <span>HMS Portal</span>
        </div>
        <a th:href="@{/}" class="sidebar-link"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a th:href="@{/admin/dashboard}" class="sidebar-link"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a>
        <a th:href="@{/admin/patients/info}" class="sidebar-link"><i class="fa-solid fa-bed"></i> <span>Patients</span></a>
        <a th:href="@{/admin/doctors/info}" class="sidebar-link active"><i class="fa-solid fa-user-doctor"></i> <span>Doctors</span></a>
        <a th:href="@{/admin/appointments/info}" class="sidebar-link"><i class="fa-solid fa-calendar-check"></i> <span>Appointments</span></a>
        <a th:href="@{/templates/billing}" class="sidebar-link"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Billing</span></a>
        <a th:href="@{/reports}" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> <span>Reports</span></a>
    </aside>
    <main class="doctor-main-content">
        <div class="patient-container">
            <div class="patient-title">
                <i class="fa-solid fa-user-doctor"></i> Doctors Information
            </div>
            <!-- Filter Section -->
            <div class="filter-section">
                <form method="get" th:action="@{/admin/doctors/info}" class="filter-bar">
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-user-md"></i> Name</label>
                        <input class="filter-input" type="text" name="name" placeholder="Search by name..." th:value="${name}" />
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-stethoscope"></i> Specialization</label>
                        <select class="filter-input" name="specialization">
                            <option value="">All Specializations</option>
                            <option value="CARDIOLOGIST" th:selected="${specialization} == 'CARDIOLOGIST'">Cardiologist</option>
                            <option value="DENTIST" th:selected="${specialization} == 'DENTIST'">Dentist</option>
                            <option value="NEUROLOGIST" th:selected="${specialization} == 'NEUROLOGIST'">Neurologist</option>
                            <option value="ORTHOPEDIC" th:selected="${specialization} == 'ORTHOPEDIC'">Orthopedic</option>
                            <option value="GENERAL_PHYSICIAN" th:selected="${specialization} == 'GENERAL_PHYSICIAN'">General Physician</option>
                            <option value="DERMATOLOGIST" th:selected="${specialization} == 'DERMATOLOGIST'">Dermatologist</option>
                            <option value="HEART_SPECIALIST" th:selected="${specialization} == 'HEART_SPECIALIST'">Heart Specialist</option>
                        </select>
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-hourglass-start"></i> Min Exp</label>
                        <input class="filter-input" type="number" name="minExperience" placeholder="Min" th:value="${minExperience}" min="0" />
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-hourglass-end"></i> Max Exp</label>
                        <input class="filter-input" type="number" name="maxExperience" placeholder="Max" th:value="${maxExperience}" min="0" />
                    </div>
                    <div class="filter-actions">
                        <button type="submit" class="filter-btn filter-search">
                            <i class="fa-solid fa-filter"></i> Filter
                        </button>
                        <a th:href="@{/admin/doctors/info}" class="filter-btn filter-clear">
                            <i class="fa-solid fa-undo"></i> Clear
                        </a>
                    </div>
                </form>
            </div>
            <!-- Add New Doctor Button -->
            <div class="add-btn-wrapper">
                <button id="addDoctorBtn" class="add-btn">
                    <i class="fa-solid fa-user-plus"></i> Add New Doctor
                </button>
            </div>
            <!-- Add Doctor Modal -->
            <div id="addDoctorModal" class="modal-overlay">
                <div class="modal-box">
                    <button id="closeModal" class="modal-close">&times;</button>
                    <div class="modal-title">
                        <i class="fa-solid fa-user-plus"></i> Add New Doctor
                    </div>
                    <form method="post" th:action="@{/admin/doctors/add}" class="modal-form" id="addDoctorForm">
                        <div class="form-group">
                            <label for="doctorNameInput">Name</label>
                            <input type="text" id="doctorNameInput" name="name" placeholder="Doctor Name" required />
                        </div>
                        <div class="form-group">
                            <label for="doctorGenderInput">Gender</label>
                            <select id="doctorGenderInput" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="doctorSpecializationInput">Specialization</label>
                            <select id="doctorSpecializationInput" name="specialization" required>
                                <option value="">Select Specialization</option>
                                <option value="CARDIOLOGIST">Cardiologist</option>
                                <option value="DENTIST">Dentist</option>
                                <option value="NEUROLOGIST">Neurologist</option>
                                <option value="ORTHOPEDIC">Orthopedic</option>
                                <option value="GENERAL_PHYSICIAN">General Physician</option>
                                <option value="DERMATOLOGIST">Dermatologist</option>
                                <option value="HEART_SPECIALIST">Heart Specialist</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="doctorExperienceInput">Experience (Years)</label>
                            <input type="number" id="doctorExperienceInput" name="experienceInYears" placeholder="Experience" min="0" required />
                        </div>
                        <button type="submit" class="modal-submit">
                            <i class="fa-solid fa-plus"></i> Add Doctor
                        </button>
                    </form>
                </div>
            </div>
            <!-- No Data -->
            <div th:if="${#lists.isEmpty(doctors.content)}" class="no-data">
                <i class="fa-solid fa-triangle-exclamation"></i> No Doctors Found
            </div>
            <!-- Doctor Cards -->
            <div class="patient-cards" th:unless="${#lists.isEmpty(doctors.content)}">
                <div class="patient-card" th:each="doctor : ${doctors.content}">
                    <div class="card-header">
                        <div class="card-avatar">
                            <i class="fa-solid fa-user-doctor"></i>
                        </div>
                        <div class="card-name" th:text="${doctor.name}">Doctor Name</div>
                        <div class="card-badge" th:text="${doctor.specialization}">Specialization</div>
                    </div>
                    <div class="card-body">
                        <div class="card-detail">
                            <i class="fa-solid fa-id-badge"></i> ID: <span th:text="${doctor.id}">0</span>
                        </div>
                        <div class="card-detail">
                            <i class="fa-solid fa-venus-mars"></i> Gender: <span th:text="${doctor.gender}">Gender</span>
                        </div>
                        <div class="card-detail">
                            <i class="fa-solid fa-briefcase-medical"></i> Experience: <span th:text="${doctor.experienceInYears} + ' yrs'">0 yrs</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="card-action-btn card-action-view" title="View Availability"
                                th:onclick="|window.location.href='/admin/doctors/' + ${doctor.id} + '/availability'|">
                            <i class="fas fa-calendar-alt"></i> View Availability
                        </button>
                        <button type="button" class="card-action-btn card-action-edit" title="Edit"
                                th:attr="data-id=${doctor.id},data-name=${doctor.name},data-gender=${doctor.gender},data-specialization=${doctor.specialization},data-experience=${doctor.experienceInYears}"
                                onclick="openEditDoctorModal(this)">
                            <i class="fa-solid fa-pen-to-square"></i> Update
                        </button>
                        <button class="card-action-btn card-action-appointments" title="View Appointments"
                                th:onclick="|window.location.href='/admin/doctors/' + ${doctor.id} + '/appointments'|">
                            <i class="fas fa-notes-medical"></i> Appointments
                        </button>
                        <form th:action="@{'/admin/doctors/delete/' + ${doctor.id}}" method="post" style="display:inline;margin:0;">
                            <button type="submit" class="card-action-btn card-action-delete" title="Delete"
                                    onclick="return confirm('Are you sure you want to delete this doctor?');">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Edit Doctor Modal -->
            <div id="editDoctorModal" class="modal-overlay">
                <div class="modal-box">
                    <button id="closeEditModal" class="modal-close">&times;</button>
                    <div class="modal-title">
                        <i class="fa-solid fa-user-pen"></i> Edit Doctor
                    </div>
                    <form method="post" th:action="@{/admin/doctors/edit}" class="modal-form" id="editDoctorForm">
                        <input type="hidden" id="editDoctorId" name="id" />
                        <div class="form-group">
                            <label for="editDoctorNameInput">Name</label>
                            <input type="text" id="editDoctorNameInput" name="name" placeholder="Doctor Name" required />
                        </div>
                        <div class="form-group">
                            <label for="editDoctorGenderInput">Gender</label>
                            <select id="editDoctorGenderInput" name="gender" required>
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="editDoctorSpecializationInput">Specialization</label>
                            <select id="editDoctorSpecializationInput" name="specialization" required>
                                <option value="CARDIOLOGIST">Cardiologist</option>
                                <option value="DENTIST">Dentist</option>
                                <option value="NEUROLOGIST">Neurologist</option>
                                <option value="ORTHOPEDIC">Orthopedic</option>
                                <option value="GENERAL_PHYSICIAN">General Physician</option>
                                <option value="DERMATOLOGIST">Dermatologist</option>
                                <option value="HEART_SPECIALIST">Heart Specialist</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="editDoctorExperienceInput">Experience (Years)</label>
                            <input type="number" id="editDoctorExperienceInput" name="experienceInYears" placeholder="Experience" min="0" required />
                        </div>
                        <button type="submit" class="modal-submit">
                            <i class="fa-solid fa-floppy-disk"></i> Save Changes
                        </button>
                    </form>
                </div>
            </div>
            <!-- Pagination -->
            <div class="pagination" th:if="${doctors.totalPages > 1}">
                <a class="page-btn"
                   th:classappend="${doctors.number == 0} ? 'disabled'"
                   th:href="@{/admin/doctors/info(pageNo=${doctors.number}, name=${name}, specialization=${specialization}, minExperience=${minExperience}, maxExperience=${maxExperience})}">
                    <i class="fa-solid fa-chevron-left"></i> Prev
                </a>
                <span th:each="i : ${#numbers.sequence(1, doctors.totalPages)}">
                    <a class="page-btn"
                       th:classappend="${doctors.number + 1 == i} ? 'active'"
                       th:href="@{/admin/doctors/info(pageNo=${i}, name=${name}, specialization=${specialization}, minExperience=${minExperience}, maxExperience=${maxExperience})}"
                       th:text="${i}"></a>
                </span>
                <a class="page-btn"
                   th:classappend="${doctors.number + 1 == doctors.totalPages} ? 'disabled'"
                   th:href="@{/admin/doctors/info(pageNo=${doctors.number + 2}, name=${name}, specialization=${specialization}, minExperience=${minExperience}, maxExperience=${maxExperience})}">
                    Next <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>
        </div>
    </main>
</div>
<script>
    // Add Doctor Modal
    const addDoctorBtn = document.getElementById('addDoctorBtn');
    const addDoctorModal = document.getElementById('addDoctorModal');
    const closeModal = document.getElementById('closeModal');
    addDoctorBtn.onclick = function() { addDoctorModal.style.display = 'flex'; };
    closeModal.onclick = function() { addDoctorModal.style.display = 'none'; };

    // Edit Doctor Modal
    function openEditDoctorModal(btn) {
        document.getElementById('editDoctorId').value = btn.getAttribute('data-id');
        document.getElementById('editDoctorNameInput').value = btn.getAttribute('data-name');
        document.getElementById('editDoctorGenderInput').value = btn.getAttribute('data-gender');
        document.getElementById('editDoctorSpecializationInput').value = btn.getAttribute('data-specialization');
        document.getElementById('editDoctorExperienceInput').value = btn.getAttribute('data-experience');
        document.getElementById('editDoctorModal').style.display = 'flex';
    }
    document.getElementById('closeEditModal').onclick = function() {
        document.getElementById('editDoctorModal').style.display = 'none';
    };

    // Close modals on backdrop click
    window.onclick = function(event) {
        if (event.target === addDoctorModal) addDoctorModal.style.display = 'none';
        if (event.target === document.getElementById('editDoctorModal')) document.getElementById('editDoctorModal').style.display = 'none';
    };
</script>
</body>
</html>
