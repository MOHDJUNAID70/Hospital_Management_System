<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Info</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        }
        .doctor-layout {
            display: flex;
            min-height: 100vh;
            background: none;
        }
        .doctor-sidebar {
            min-width: 240px;
            max-width: 260px;
            background: linear-gradient(180deg, #e3e9f7 0%, #f8fafd 100%);
            border-radius: 24px 0 0 24px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            padding: 36px 18px 18px 18px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: sticky;
            top: 0;
            height: 100vh;z-index: 10;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: 800;
            color: #232946;
            margin-bottom: 38px;
            letter-spacing: 1px;
        }
        .sidebar-header i { color: #00c6ff; font-size: 1.7rem; }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            margin-bottom: 10px;
            font-size: 1.08rem;
            font-weight: 600;
            color: #232946;
            background: transparent;
            border-radius: 10px;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            width: 100%;
        }
        .sidebar-link.active, .sidebar-link:hover {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .sidebar-link i { font-size: 1.2rem; color: #00c6ff; transition: color 0.2s; }
        .sidebar-link.active i, .sidebar-link:hover i { color: #fff; }
        .doctor-main-content { flex: 1; padding: 0; background: none; min-width: 0; }
        .patient-container {
            max-width: 1200px;
            margin: 48px auto 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            padding: 40px 32px 32px 32px;
            position: relative;
        }
        .patient-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 32px;
            color: #232946;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,198,255,0.08);
        }
        /* Filter Section */
        .filter-section {
            background: linear-gradient(90deg, #f8fafd 0%, #e3e9f7 100%);
            border-radius: 32px;
            box-shadow: 0 2px 16px rgba(0,198,255,0.10);
            padding: 0;
            margin-bottom: 32px;
            width: 100%;
        }
        .filter-bar {
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 24px 32px 18px 32px;
            gap: 18px;
        }
        .filter-col {
            display: flex;
            flex-direction: column;
            min-width: 140px;
            flex: 1 1 0;
        }
        .filter-label {
            font-weight: 600;
            color: #232946;
            margin-bottom: 6px;
            font-size: 1.02rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-input {
            border: 2px solid #e0e6f7;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 1.05rem;
            background: #fff;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .filter-input:focus { border: 2px solid #00c6ff; outline: none; }
        .filter-actions {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex: 0 0 auto;
        }
        .filter-btn {
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-decoration: none;
        }
        .filter-search {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .filter-search:hover { background: linear-gradient(90deg, #232946 0%, #00c6ff 100%); }
        .filter-clear {
            background: #fafdff;
            color: #232946;
            border: 2px solid #bbb;
        }
        .filter-clear:hover { background: #e0e6f7; color: #00c6ff; }
        /* Cards Grid */
        .patient-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
            justify-items: center;
        }
        .patient-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(44,62,80,0.10);
            padding: 0;
            width: 100%;
            max-width: 360px;
            transition: box-shadow 0.3s, transform 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .patient-card:hover {
            box-shadow: 0 12px 40px rgba(0,198,255,0.22);
            transform: translateY(-6px);
        }
        .card-header {
            background: linear-gradient(135deg, #00c6ff 0%, #232946 100%);
            padding: 28px 24px 18px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .card-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .card-avatar i {
            font-size: 2rem;
            color: #fff;
        }
        .card-name {
            font-size: 1.35rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .card-badge {
            display: inline-block;
            background: rgba(255,255,255,0.22);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 3px 16px;
            border-radius: 20px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .card-body {
            padding: 20px 24px 22px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }
        .card-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            color: #555;
        }
        .card-detail i {
            color: #00c6ff;
            font-size: 1.05rem;
            width: 22px;
            text-align: center;
        }
        .card-detail span {
            font-weight: 700;
            color: #232946;
        }
        .card-divider {
            border: none;
            border-top: 1.5px solid #e0e6f7;
            margin: 6px 0;
        }
        .card-user-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .card-user-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: #232946;
            font-size: 0.95rem;
        }
        .card-user-label i {
            color: #00c6ff;
            font-size: 1rem;
        }
        .card-user-details {
            padding-left: 30px;
            font-size: 0.92rem;
            color: #555;
        }
        .card-user-details div {
            margin-bottom: 2px;
        }
        .card-user-details span {
            font-weight: 700;
            color: #232946;
        }
        .no-data {
            text-align: center;
            color: #a94442;
            font-size: 1.3rem;
            font-style: italic;
            margin: 48px 0;
        }
        .no-data i { font-size: 1.5rem; margin-right: 6px; }
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 36px;
        }
        .page-btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 2px solid #e0e6f7;
            background: #fff;
            color: #232946;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .page-btn:hover { background: #00c6ff; color: #fff; border-color: #00c6ff; }
        .page-btn.active { background: linear-gradient(90deg, #00c6ff 0%, #232946 100%); color: #fff; border-color: #00c6ff; }
        .page-btn.disabled { opacity: 0.5; pointer-events: none; }
        @media (max-width: 900px) {
            .filter-bar { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; }
            .filter-col { width: 100%; min-width: 0; }
            .patient-cards { grid-template-columns: 1fr; }
            .doctor-sidebar { display: none; }
            .patient-container { margin: 16px 8px; padding: 20px 10px; }
        }
    </style>
</head>
<body>
<div class="doctor-layout">
    <aside class="doctor-sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-hospital"></i>
            <span>HMS Portal</span>
        </div>
        <a th:href="@{/}" class="sidebar-link"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a th:href="@{/admin/dashboard}" class="sidebar-link"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a>
        <a th:href="@{/admin/patients/info}" class="sidebar-link active"><i class="fa-solid fa-bed"></i> <span>Patients</span></a>
        <a th:href="@{/admin/doctors/info}" class="sidebar-link"><i class="fa-solid fa-user-doctor"></i> <span>Doctors</span></a>
        <a th:href="@{/admin/appointments/info}" class="sidebar-link"><i class="fa-solid fa-calendar-check"></i> <span>Appointments</span></a>
        <a th:href="@{/templates/billing}" class="sidebar-link"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Billing</span></a>
        <a th:href="@{/reports}" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> <span>Reports</span></a>
    </aside>
    <main class="doctor-main-content">
        <div class="patient-container">
            <div class="patient-title">
                <i class="fa-solid fa-user-injured"></i> Patients Information
            </div>
            <!-- Filter Section -->
            <div class="filter-section">
                <form method="get" th:action="@{/admin/patients/info}" class="filter-bar">
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-user"></i> Name</label>
                        <input class="filter-input" type="text" name="name" placeholder="Search by name..." th:value="${name}" />
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-location-dot"></i> Address</label>
                        <input class="filter-input" type="text" name="address" placeholder="Search by address..." th:value="${address}" />
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-arrow-down-1-9"></i> Min Age</label>
                        <input class="filter-input" type="number" name="StartAge" placeholder="Min" th:value="${StartAge}" min="0" />
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-arrow-up-1-9"></i> Max Age</label>
                        <input class="filter-input" type="number" name="EndAge" placeholder="Max" th:value="${EndAge}" min="0" />
                    </div>
                    <div class="filter-actions">
                        <button type="submit" class="filter-btn filter-search">
                            <i class="fa-solid fa-search"></i> Filter
                        </button>
                        <a th:href="@{/admin/patients/info}" class="filter-btn filter-clear">
                            <i class="fa-solid fa-undo"></i> Clear
                        </a>
                    </div>
                </form>
            </div>
            <!-- No Data -->
            <div th:if="${#lists.isEmpty(patients.content)}" class="no-data">
                <i class="fa-solid fa-triangle-exclamation"></i> No Patients Found
            </div>
            <!-- Patient Cards -->
            <div class="patient-cards" th:unless="${#lists.isEmpty(patients.content)}">
                <div class="patient-card" th:each="patient : ${patients.content}">
                    <div class="card-header">
                        <div class="card-avatar">
                            <i class="fa-solid fa-user-injured"></i>
                        </div>
                        <div class="card-name" th:text="${patient.name}">Patient Name</div>
                        <div class="card-badge" th:text="${patient.gender}">Gender</div>
                    </div>
                    <div class="card-body">
                        <div class="card-detail">
                            <i class="fa-solid fa-id-badge"></i> ID: <span th:text="${patient.id}">0</span>
                        </div>
                        <div class="card-detail">
                            <i class="fa-solid fa-cake-candles"></i> Age: <span th:text="${patient.age}">0</span>
                        </div>
                        <div class="card-detail">
                            <i class="fa-solid fa-location-dot"></i> Address: <span th:text="${patient.address}">Address</span>
                        </div>
                        <div class="card-detail">
                            <i class="fa-solid fa-phone"></i> Phone: <span th:text="${patient.phone}">0000000000</span>
                        </div>
                        <hr class="card-divider">
                        <div class="card-user-section">
                            <div class="card-user-label">
                                <i class="fa-solid fa-user"></i> Added By User
                            </div>
                            <div class="card-user-details">
                                <div>ID: <span th:text="${patient.getUserInfo().getUserId()}"></span></div>
                                <div>Username: <span th:text="${patient.getUserInfo().getUsername()}"></span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Pagination -->
            <div class="pagination" th:if="${patients.totalPages > 1}">
                <a class="page-btn"
                   th:classappend="${patients.number == 0} ? 'disabled'"
                   th:href="@{/admin/patients/info(pageNo=${patients.number}, name=${name}, address=${address}, StartAge=${StartAge}, EndAge=${EndAge})}">
                    <i class="fa-solid fa-chevron-left"></i> Prev
                </a>
                <span th:each="i : ${#numbers.sequence(1, patients.totalPages)}">
                    <a class="page-btn"
                       th:classappend="${patients.number + 1 == i} ? 'active'"
                       th:href="@{/admin/patients/info(pageNo=${i}, name=${name}, address=${address}, StartAge=${StartAge}, EndAge=${EndAge})}"
                       th:text="${i}"></a>
                </span>
                <a class="page-btn"
                   th:classappend="${patients.number + 1 == patients.totalPages} ? 'disabled'"
                   th:href="@{/admin/patients/info(pageNo=${patients.number + 2}, name=${name}, address=${address}, StartAge=${StartAge}, EndAge=${EndAge})}">
                    Next <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
