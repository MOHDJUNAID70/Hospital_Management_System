<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <title>HMS</title>
</head>

<body>
<div class="layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-hospital"></i>
            <span>HMS Portal</span>
        </div>
        <a th:href="@{/}"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a th:href="@{/admin/dashboard}" class="active"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a>
        <a th:href="@{/admin/patients/info}"><i class="fa-solid fa-bed"></i> <span>Patients</span></a>
        <a th:href="@{/admin/doctors/info}"><i class="fa-solid fa-user-doctor"></i> <span>Doctors</span></a>
        <a th:href="@{/admin/appointments/info}"><i class="fa-solid fa-calendar-check"></i> <span>Appointments</span>
        </a>
        <a th:href="@{/templates/billing}"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Billing</span></a>
        <a th:href="@{/reports}"><i class="fa-solid fa-chart-line"></i> <span>Reports</span></a>
        <div class="profile-menu">
            <i class="fa-solid fa-circle-user profile-icon" id="profileIcon"></i>
            <div class="dropdown" id="profileDropdown">
                <a th:href="@{/profile}"><i class="fa-solid fa-user"></i> My Profile</a>
                <a th:href="@{/settings}"><i class="fa-solid fa-gear"></i> Settings</a>
                <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </div>
    </aside>
    <!-- ===== MAIN CONTENT ===== -->
    <main class="content">
        <div class="dashboard-container">
            <div class="dashboard-title">
                <i class="fa-solid fa-gauge"></i> Admin Dashboard
            </div>
            <!-- Stat Cards -->
            <div class="cards">
                <a th:href="@{/admin/doctors/info}" class="card">
                    <div class="card-icon-section">
                        <div class="card-icon-circle">
                            <i class="fa-solid fa-user-doctor"></i>
                        </div>
                        <div class="card-label">Doctors</div>
                    </div>
                    <div class="card-value-section">
                        <div class="card-value" th:text="${doctorCount}">0</div>
                    </div>
                </a>
                <a th:href="@{/admin/patients/info}" class="card">
                    <div class="card-icon-section">
                        <div class="card-icon-circle">
                            <i class="fa-solid fa-bed"></i>
                        </div>
                        <div class="card-label">Patients</div>
                    </div>
                    <div class="card-value-section">
                        <div class="card-value" th:text="${patientCount}">0</div>
                    </div>
                </a>
                <a th:href="@{/admin/appointments/info}" class="card">
                    <div class="card-icon-section">
                        <div class="card-icon-circle">
                            <i class="fa-solid fa-calendar-check"></i>
                        </div>
                        <div class="card-label">Appointments</div>
                    </div>
                    <div class="card-value-section">
                        <div class="card-value" th:text="${appointmentCount}">0</div>
                    </div>
                </a>
                <div class="card">
                    <div class="card-icon-section">
                        <div class="card-icon-circle">
                            <i class="fa-solid fa-clock"></i>
                        </div>
                        <div class="card-label">Today's Appointments</div>
                    </div>
                    <div class="card-value-section">
                        <div class="card-value" th:text="${todayAppointments}">0</div>
                    </div>
                </div>
            </div>
            <!-- Recent Appointments Table -->
            <div class="table-container">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Appointments</h3>
                <div th:if="${#lists.isEmpty(recentAppointments)}" style="text-align:center;color:#a94442;font-size:1.2rem;padding:24px 0;font-style:italic;">
                    <i class="fa-solid fa-triangle-exclamation"></i> No Appointments Found
                </div>
                <table th:unless="${#lists.isEmpty(recentAppointments)}">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="appt : ${recentAppointments}">
                        <td th:text="${appt.id}">0</td>
                        <td th:text="${appt.patientInfo.name}">Patient</td>
                        <td th:text="${appt.doctorInfo.name}">Doctor</td>
                        <td th:text="${appt.appointmentDate}">Date</td>
                        <td th:text="${appt.appointmentTime}">Time</td>
                        <td>
                            <span class="status"
                                  th:classappend="${appt.status.name() == 'Booked'} ? 'confirmed' : (${appt.status.name() == 'Cancelled'} ? 'cancelled' : 'pending')"
                                  th:text="${appt.status}">Status</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script>
    window.addEventListener('DOMContentLoaded', function () {
        const icon = document.getElementById("profileIcon");
        const dropdown = document.getElementById("profileDropdown");
        icon.addEventListener("click", function (e) {
            e.stopPropagation();
            dropdown.classList.toggle("show");
        });
        document.addEventListener("click", function () {
            dropdown.classList.remove("show");
        });
    });
</script>
</body>

</html>
