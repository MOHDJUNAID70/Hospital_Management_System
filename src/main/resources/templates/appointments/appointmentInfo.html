<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        }
        .doctor-layout {
            display: flex;
            min-height: 100vh;
            background: none;
        }
        .doctor-sidebar {
            min-width: 240px;
            max-width: 260px;
            background: linear-gradient(180deg, #e3e9f7 0%, #f8fafd 100%);
            border-radius: 24px 0 0 24px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            padding: 36px 18px 18px 18px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 10;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: 800;
            color: #232946;
            margin-bottom: 38px;
            letter-spacing: 1px;
        }
        .sidebar-header i { color: #00c6ff; font-size: 1.7rem; }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            margin-bottom: 10px;
            font-size: 1.08rem;
            font-weight: 600;
            color: #232946;
            background: transparent;
            border-radius: 10px;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            width: 100%;
        }
        .sidebar-link.active, .sidebar-link:hover {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .sidebar-link i { font-size: 1.2rem; color: #00c6ff; transition: color 0.2s; }
        .sidebar-link.active i, .sidebar-link:hover i { color: #fff; }
        .doctor-main-content { flex: 1; padding: 0; background: none; min-width: 0; }
        .appointments-container {
            max-width: 1200px;
            margin: 48px auto 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            padding: 40px 32px 32px 32px;
            position: relative;
        }
        .appointments-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 32px;
            color: #232946;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,198,255,0.08);
        }
        /* Filter Section */
        .filter-section {
            background: linear-gradient(90deg, #f8fafd 0%, #e3e9f7 100%);
            border-radius: 32px;
            box-shadow: 0 2px 16px rgba(0,198,255,0.10);
            padding: 0;
            margin-bottom: 32px;
            width: 100%;
        }
        .filter-bar {
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 24px 32px 18px 32px;
            gap: 18px;
        }
        .filter-col {
            display: flex;
            flex-direction: column;
            min-width: 150px;
            flex: 1 1 0;
        }
        .filter-label {
            font-weight: 600;
            color: #232946;
            margin-bottom: 6px;
            font-size: 1.02rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-input {
            border: 2px solid #e0e6f7;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 1.05rem;
            background: #fff;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .filter-input:focus { border: 2px solid #00c6ff; outline: none; }
        .filter-actions {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex: 0 0 auto;
        }
        .filter-btn {
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .filter-search {
            background: linear-gradient(90deg, #00c6ff 0%, #232946 100%);
            color: #fff;
        }
        .filter-search:hover { background: linear-gradient(90deg, #232946 0%, #00c6ff 100%); }
        .filter-clear {
            background: #fafdff;
            color: #232946;
            border: 2px solid #bbb;
        }
        .filter-clear:hover { background: #e0e6f7; color: #00c6ff; }
        /* Cards */
        .appt-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
        }
        .appt-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(44,62,80,0.10);
            padding: 28px 24px 20px 24px;
            min-width: 260px;
            max-width: 300px;
            flex: 1 1 260px;
            text-align: center;
            transition: box-shadow 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .appt-card:hover {
            box-shadow: 0 8px 32px rgba(0,198,255,0.18);
            transform: translateY(-4px);
        }
        .appt-card .card-icon { font-size: 2.2rem; color: #00c6ff; margin-bottom: 10px; }
        .appt-card .card-id { font-size: 0.9rem; color: #888; margin-bottom: 6px; }
        .appt-card .card-patient { font-size: 1.25rem; font-weight: 800; color: #232946; margin-bottom: 4px; }
        .appt-card .card-detail { font-size: 1rem; color: #555; margin-bottom: 4px; }
        .appt-card .card-detail span { font-weight: 700; color: #232946; }
        .appt-card .card-badge {
            display: inline-block;
            font-size: 0.88rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            margin: 8px 0 6px 0;
            letter-spacing: 0.5px;
        }
        .badge-Booked { background: #d1f7c4; color: #2e7d32; }
        .badge-Cancelled { background: #ffcdd2; color: #c62828; }
        .badge-Rescheduled { background: #fff3cd; color: #856404; }
        .badge-default { background: linear-gradient(90deg, #00c6ff 0%, #232946 100%); color: #fff; }
        .no-data {
            text-align: center;
            color: #a94442;
            font-size: 1.2rem;
            font-style: italic;
            margin: 32px 0;
        }
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
        }
        .page-btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 2px solid #e0e6f7;
            background: #fff;
            color: #232946;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .page-btn:hover { background: #00c6ff; color: #fff; border-color: #00c6ff; }
        .page-btn.active { background: linear-gradient(90deg, #00c6ff 0%, #232946 100%); color: #fff; border-color: #00c6ff; }
        .page-btn.disabled { opacity: 0.5; pointer-events: none; }
        @media (max-width: 900px) {
            .filter-bar { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; }
            .filter-col { width: 100%; min-width: 0; }
        }
    </style>
</head>
<body>
<div class="doctor-layout">
    <aside class="doctor-sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-hospital"></i>
            <span>HMS Portal</span>
        </div>
        <a th:href="@{/}" class="sidebar-link"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a th:href="@{/admin/dashboard}" class="sidebar-link"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a>
        <a th:href="@{/admin/patients/info}" class="sidebar-link"><i class="fa-solid fa-bed"></i> <span>Patients</span></a>
        <a th:href="@{/admin/doctors/info}" class="sidebar-link"><i class="fa-solid fa-user-doctor"></i> <span>Doctors</span></a>
        <a th:href="@{/admin/appointments/info}" class="sidebar-link active"><i class="fa-solid fa-calendar-check"></i> <span>Appointments</span></a>
        <a th:href="@{/templates/billing}" class="sidebar-link"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Billing</span></a>
        <a th:href="@{/reports}" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> <span>Reports</span></a>
    </aside>
    <main class="doctor-main-content">
        <div class="appointments-container">
            <div class="appointments-title">
                <i class="fa-solid fa-calendar-check"></i> All Appointments
            </div>
            <!-- Filter Section -->
            <div class="filter-section">
                <form method="get" th:action="@{/admin/appointments/info}" class="filter-bar">
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-calendar-day"></i> Date</label>
                        <input class="filter-input" type="date" name="appointmentDate" th:value="${appointmentDate}" />
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-circle-info"></i> Status</label>
                        <select class="filter-input" name="status">
                            <option value="">All</option>
                            <option value="Booked" th:selected="${status != null and status.name() == 'Booked'}">Booked</option>
                            <option value="Cancelled" th:selected="${status != null and status.name() == 'Cancelled'}">Cancelled</option>
                            <option value="Rescheduled" th:selected="${status != null and status.name() == 'Rescheduled'}">Rescheduled</option>
                        </select>
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-clock"></i> Start Time</label>
                        <input class="filter-input" type="time" name="appointmentStartTime" th:value="${appointmentStartTime}" />
                    </div>
                    <div class="filter-col">
                        <label class="filter-label"><i class="fa-solid fa-clock"></i> End Time</label>
                        <input class="filter-input" type="time" name="appointmentEndTime" th:value="${appointmentEndTime}" />
                    </div>
                    <div class="filter-actions">
                        <button type="submit" class="filter-btn filter-search">
                            <i class="fa-solid fa-search"></i> Filter
                        </button>
                        <a th:href="@{/admin/appointments/info}" class="filter-btn filter-clear">
                            <i class="fa-solid fa-undo"></i> Clear
                        </a>
                    </div>
                </form>
            </div>
            <!-- No Data -->
            <div th:if="${appointments.content.isEmpty()}" class="no-data">
                <i class="fa-solid fa-triangle-exclamation"></i> No Appointments Found
            </div>
            <!-- Cards -->
            <div class="appt-cards">
                <a th:href="@{/admin/appointment/details/{id}(id=${appt.id})}" style="text-decoration: none; color: inherit;" th:each="appt : ${appointments.content}">
                    <div class="appt-card" style="cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-8px)'; this.style.boxShadow='0 12px 24px rgba(0,0,0,0.15)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(0,0,0,0.08)'">
                        <i class="fa-solid fa-calendar-check card-icon"></i>
                        <div class="card-id">Appointment #<span th:text="${appt.id}"></span></div>
                        <div class="card-patient">Patient Name: <span th:text="${appt.patientInfo.name}"></span></div>
                        <div class="card-detail"><i class="fa-solid fa-user-doctor"></i><span th:text="${appt.doctorInfo.name}"></span></div>
<!--                    <div class="card-detail"><i class="fa-solid fa-stethoscope"></i> <span th:text="${appt.doctorInfo.specialization}"></span></div>-->
<!--                        <div class="card-detail"><i class="fa-solid fa-calendar-day"></i> Date: <span th:text="${appt.appointmentDate}"></span></div>-->
<!--                        <div class="card-detail"><i class="fa-solid fa-clock"></i> Time: <span th:text="${#temporals.format(appt.appointmentTime,'hh:mm a')}"></span> - <span th:text="${#temporals.format(appt.appointmentEndTime,'hh:mm a')}"></span></div>-->
                        <div class="card-badge"
                             th:classappend="${appt.status.name() == 'Booked'} ? 'badge-Booked' : (${appt.status.name() == 'Cancelled'} ? 'badge-Cancelled' : (${appt.status.name() == 'Rescheduled'} ? 'badge-Rescheduled' : 'badge-default'))"
                             th:text="${appt.status}"></div>
                    </div>
                </a>
            </div>
            <!-- Pagination -->
            <div class="pagination" th:if="${appointments.totalPages > 1}">
                <a class="page-btn"
                   th:classappend="${appointments.number == 0} ? 'disabled'"
                   th:href="@{/admin/appointments/info(pageNo=${appointments.number},appointmentDate=${appointmentDate},status=${status},appointmentStartTime=${appointmentStartTime},appointmentEndTime=${appointmentEndTime})}">
                    <i class="fa-solid fa-chevron-left"></i> Prev
                </a>
                <span th:each="i : ${#numbers.sequence(1, appointments.totalPages)}">
                    <a class="page-btn"
                       th:classappend="${appointments.number + 1 == i} ? 'active'"
                       th:href="@{/admin/appointments/info(pageNo=${i},appointmentDate=${appointmentDate},status=${status},appointmentStartTime=${appointmentStartTime},appointmentEndTime=${appointmentEndTime})}"
                       th:text="${i}"></a>
                </span>
                <a class="page-btn"
                   th:classappend="${appointments.number + 1 == appointments.totalPages} ? 'disabled'"
                   th:href="@{/admin/appointments/info(pageNo=${appointments.number + 2},appointmentDate=${appointmentDate},status=${status},appointmentStartTime=${appointmentStartTime},appointmentEndTime=${appointmentEndTime})}">
                    Next <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
